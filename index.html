<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p2p-collab</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<!-- TOP BAR -->
<div id="topbar" style="display:none;">
  <div class="topbar-left">
    <span id="topbar-filename">📄 Untitled.md</span>
  </div>
  <div class="topbar-center">
    <span class="status disconnected" id="main-status">disconnected</span>
  </div>
  <div class="topbar-right">
    <span id="topbar-users">👤 No users connected</span>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content">

  <!-- Email + Controls -->
  <div id="controls-bar">
    <input id="email-input" class="url-input" placeholder="your@email.com" style="max-width:240px;">
    <button id="create-room-btn">Create Room</button>
    <span style="color:#8b949e;font-size:12px;">or open a shared URL to join</span>
  </div>

  <!-- Share URL -->
  <div id="share-section" style="display:none;">
    <div class="section-label">Share this URL</div>
    <div class="url-box empty" id="share-url">Click "Create Room" to generate</div>
    <div class="url-size" id="share-url-size"></div>
  </div>

  <!-- Pending requests -->
  <div id="pending-section" style="display:none;">
    <div class="section-label">Pending Join Requests</div>
    <div id="pending-list"></div>
  </div>

  <!-- Editor -->
  <div id="editor-section" style="display:none;">
    <div id="editor-toolbar">
      <div class="btn-row">
        <button id="open-file-btn" disabled>📂 Open</button>
        <button id="save-file-btn" disabled>💾 Save</button>
      </div>
    </div>
    <div id="editor"></div>
  </div>

  <!-- Chat -->
  <div id="chat-section">
    <div class="log" id="chat-log">
      <div class="entry system">Enter your email and click Create Room, or open a shared URL</div>
    </div>
    <div class="msg-row" style="padding:8px 0 0 0;">
      <input id="chat-input" placeholder="Type a message..." disabled>
      <button id="chat-send-btn" disabled>Send</button>
    </div>
  </div>

</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
