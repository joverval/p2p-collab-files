<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p2p-collab-files</title>
  <link rel="stylesheet" href="/src/style.css">
  <script src="/vendor/simplepeer.min.js"></script>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="topbar-left">
    <span id="topbar-filename" contenteditable="true">Untitled.md</span>
  </div>
  <div class="topbar-right">
    <!-- File menu -->
    <div class="dropdown">
      <button class="icon-btn" id="file-menu-btn" title="File">📂</button>
      <div class="dropdown-menu" id="file-dropdown">
        <button id="open-file-btn" disabled>📂 Open File</button>
        <button id="save-file-btn" disabled>💾 Save</button>
        <button id="sync-btn" disabled style="display:none;">🔄 Sync from Host</button>
      </div>
    </div>
    <button class="icon-btn panel-btn" data-panel="info" title="How it works">ℹ️</button>
    <button class="icon-btn panel-btn" data-panel="users" title="Connected users">
      <span>👤</span>
      <span id="user-count">0</span>
    </button>
    <button class="icon-btn panel-btn has-notif" data-panel="chat" title="Chat">
      <span>💬</span>
      <span class="notif-dot" id="chat-notif"></span>
    </button>
  </div>
</div>

<!-- MAIN + PANEL -->
<div id="app-layout">

  <!-- MAIN CONTENT -->
  <div id="main-content">

    <!-- Single-line handshake -->
    <div id="handshake-bar">
      <input id="email-input" class="compact-input" placeholder="your@email.com">
      <button id="create-room-btn">Create Room</button>
      <button id="copy-invite-btn" class="handshake-btn" style="display:none;">📋 Copy invite</button>
      <span id="invite-copied" style="display:none;color:#3fb950;font-size:12px;">Copied!</span>
      <span id="handshake-spacer" style="flex:1;"></span>
      <input id="manual-answer-input" class="compact-input" placeholder="Paste answer URL..." style="display:none;">
      <button id="manual-answer-btn" style="display:none;">Apply</button>
    </div>

    <!-- Pending requests (relay mode) -->
    <div id="pending-section" style="display:none;">
      <div class="pending-item" id="pending-list"></div>
    </div>

    <!-- Editor -->
    <div id="editor-section" style="display:none;">
      <div id="editor"></div>
    </div>

  </div>

  <!-- UNIFIED RIGHT PANEL -->
  <div id="right-panel" class="panel-hidden">
    <div class="panel-header">
      <span id="panel-title">Panel</span>
      <button class="icon-btn" id="panel-close">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
