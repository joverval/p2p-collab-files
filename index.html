<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p2p-collab-files</title>
  <link rel="stylesheet" href="/src/style.css">
  <script src="/vendor/simplepeer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script data-goatcounter="https://track.joverval.cl/count" async src="https://track.joverval.cl/count.js"></script>
</head>
<body>

<!-- TOP BAR (all controls + info) -->
<div id="topbar">

  <!-- LEFT GROUP: filename + file menu + handshake -->
  <div class="topbar-group topbar-left">
    <span id="topbar-filename" contenteditable="true">Untitled.md</span>

    <div class="dropdown">
      <button class="icon-btn" id="file-menu-btn" title="File">📂</button>
      <div class="dropdown-menu" id="file-dropdown">
        <button id="open-file-btn" disabled>📂 Open File</button>
        <button id="save-file-btn" disabled>💾 Save</button>
        <button id="sync-btn" disabled style="display:none;">🔄 Sync from Host</button>
      </div>
    </div>

    <input id="email-input" class="compact-input" placeholder="your@email.com">
    <button id="create-room-btn">Create Room</button>
    <button id="copy-invite-btn" class="handshake-btn" style="display:none;">📋 Copy invite</button>
    <span id="invite-copied" style="display:none;color:#3fb950;font-size:12px;">Copied!</span>
    <input id="manual-answer-input" class="compact-input" placeholder="Paste answer..." style="display:none;">
    <button id="manual-answer-btn" style="display:none;">Apply</button>
  </div>

  <!-- CENTER: spacer -->
  <div style="flex:1;"></div>

  <!-- RIGHT GROUP: pending + info + users + chat -->
  <div class="topbar-group topbar-right">
    <div id="pending-section" style="display:none;">
      <div class="pending-inline" id="pending-list"></div>
    </div>
    <button class="icon-btn panel-btn" data-panel="info" title="How it works">ℹ️</button>
    <button class="icon-btn panel-btn" data-panel="users" title="Connected users">
      <span>👤</span>
      <span id="user-count">0</span>
    </button>
    <button class="icon-btn panel-btn has-notif" data-panel="chat" title="Chat">
      <span>💬</span>
      <span class="notif-dot" id="chat-notif"></span>
    </button>
  </div>
</div>

<!-- MAIN + PANEL -->
<div id="app-layout">

  <!-- MAIN CONTENT -->
  <div id="main-content">

    <!-- Editor + Preview -->
    <div id="editor-section" style="display:none;">
      <!-- Mobile toggle -->
      <div id="mobile-toggle" style="display:none;">
        <button id="show-editor-btn" class="tab-btn active">✏️ Editor</button>
        <button id="show-preview-btn" class="tab-btn">👁️ Preview</button>
      </div>
      <div id="editor-preview-wrap">
        <div id="editor"></div>
        <div id="preview"></div>
      </div>
    </div>

  </div>

  <!-- UNIFIED RIGHT PANEL -->
  <div id="right-panel" class="panel-hidden">
    <div class="panel-header">
      <span id="panel-title">Panel</span>
      <button class="icon-btn" id="panel-close">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

</div>

<script type="module" src="/src/main.ts"></script>

<!-- TOAST for pending requests (mobile-friendly) -->
<div id="toast" style="display:none;">
  <span id="toast-msg"></span>
  <div class="toast-btns">
    <button id="toast-approve">Approve</button>
    <button id="toast-reject" class="reject-btn">Reject</button>
  </div>
</div>
</body>
</html>
