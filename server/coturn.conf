# coturn config — p2p-collab TURN/STUN server
# Dynamic IP: uses external-ip detection via ifconfig.me

listening-port=3478
listening-ip=192.168.100.13

# Dynamic public IP detection (runs every refresh cycle)
external-ip=181.43.195.152/192.168.100.13

# STUN + TURN (no TLS needed for WebRTC, browsers allow plain TURN)
# TLS on 5349 optional — Chrome requires it for some origins but
# plain 3478 works for WebRTC in practice
no-tls
no-dtls

# Auth: long-term credentials
lt-cred-mech
realm=relay.joverval.cl
# user= — set via TURN_USER:TURN_PASS environment variables at deploy time
# Generate with: echo "user=${TURN_USER}:${TURN_PASS}" >> coturn.conf

# Performance
min-port=49152
max-port=65535
verbose
fingerprint
no-multicast-peers

# Logging
log-file=/var/log/coturn.log
simple-log