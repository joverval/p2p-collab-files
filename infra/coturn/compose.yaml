services:
  coturn:
    image: coturn/coturn:4.6.2
    container_name: p2p-collab-coturn
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./generated-turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./certs:/certs:ro
    command:
      - -c
      - /etc/coturn/turnserver.conf