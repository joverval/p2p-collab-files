version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - "dependencies"
      - "npm"
    groups:
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      codemirror:
        patterns:
          - "codemirror"
          - "@codemirror/*"
      yjs:
        patterns:
          - "yjs"
          - "y-*"
          - "lib0"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
