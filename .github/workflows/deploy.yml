name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: joverval/p2p-collab
          path: lib

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - run: cd lib && npm ci && npm run build

      # Create symlink so vite alias '../p2p-collab/dist/index.js' resolves
      - run: ln -s "$PWD/lib" "$PWD/../p2p-collab"

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment